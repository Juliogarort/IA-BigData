<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Dígitos - ML Julio García</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔢 Clasificador de Dígitos</h1>
        <p class="subtitle">Dibuja un número del 0 al 9</p>

        <div class="accuracy-badge">
            📊 Precisión del modelo: {{ accuracy }}%
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>

        <div class="buttons">
            <button class="btn-predict" onclick="predecir()">Predecir</button>
            <button class="btn-clear" onclick="borrar()">Borrar</button>
        </div>

        <div class="result-box" id="resultBox">
            <p class="placeholder-text">Dibuja un número y pulsa "Predecir"</p>
        </div>

        <p class="author">Julio García — Clasificador de Dígitos con scikit-learn</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        // Fondo negro
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Configurar trazo blanco grueso
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 18;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // --- Eventos de ratón ---
        canvas.addEventListener('mousedown', (e) => {
            dibujando = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!dibujando) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => { dibujando = false; });
        canvas.addEventListener('mouseout', () => { dibujando = false; });

        // --- Eventos táctiles ---
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dibujando = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!dibujando) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', () => { dibujando = false; });

        // --- Funciones ---
        function borrar() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('resultBox').innerHTML =
                '<p class="placeholder-text">Dibuja un número y pulsa "Predecir"</p>';
        }

        async function predecir() {
            const imageData = canvas.toDataURL('image/png');

            document.getElementById('resultBox').innerHTML =
                '<p class="placeholder-text">Analizando...</p>';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById('resultBox').innerHTML =
                        `<p class="placeholder-text">Error: ${data.error}</p>`;
                    return;
                }

                document.getElementById('resultBox').innerHTML = `
                    <p class="result-label">Número detectado</p>
                    <p class="result-number">${data.prediction}</p>
                    <p class="result-confidence">Confianza: ${data.confidence}</p>
                `;
            } catch (error) {
                document.getElementById('resultBox').innerHTML =
                    `<p class="placeholder-text">Error de conexión</p>`;
            }
        }
    </script>
</body>
</html>
