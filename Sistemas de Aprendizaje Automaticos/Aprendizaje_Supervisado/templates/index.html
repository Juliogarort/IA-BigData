<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de dígitos - JGO</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Fondo con grid decorativo -->
    <div class="bg-grid"></div>

    <main class="app">

        <!-- Cabecera -->
        <header class="header">
            <div class="header-top">
                <div class="brand">
                    <span class="brand-dot"></span>
                    <span class="brand-name">Clasificador de dígitos</span>
                </div>
                <!-- Badge con la precisión del modelo, inyectado desde Flask -->
                <span class="accuracy-pill">
                    <span class="pill-dot"></span>
                    acc {{ accuracy }}%
                </span>
            </div>
            <p class="subtitle">Dibuja un dígito del 0 al 9 y pulsa predecir</p>
            <p class="subtitle">Dibuja el número centrado y con el mayor tamaño posible</p>
        </header>

        <section class="canvas-section">
            <div class="canvas-wrapper">
                <canvas id="drawCanvas" width="256" height="256"></canvas>
                <div class="canvas-overlay" id="canvasHint">
                    <span class="hint-icon">✏️</span>
                    <span class="hint-text">dibuja aquí</span>
                </div>
            </div>
        </section>

        <!-- Controles -->
        <div class="controls">
            <button class="btn btn-predict" onclick="predecir()">
                <span class="btn-icon">→</span>
                Predecir
            </button>
            <button class="btn btn-clear" onclick="borrar()" title="Limpiar canvas">
                Limpiar
            </button>
        </div>

        <!-- Resultado de la predicción -->
        <div class="result" id="resultBox">
            <div class="result-empty">
                <span class="result-empty-char">?</span>
                <span class="result-empty-label">sin predicción</span>
            </div>
        </div>

        <!-- Pie -->
        <footer class="footer">
            <span>Julio García</span>
        </footer>

    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
