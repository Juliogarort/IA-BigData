<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Classifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #F7F5F0;
            --surface:      #FFFFFF;
            --ink:          #1A1A18;
            --ink-muted:    #8A887E;
            --ink-faint:    #C8C5BC;
            --accent:       #E8420A;
            --accent-light: #FFF0EB;
            --border:       #E2DFD8;
            --mono: 'DM Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .app { width: 100%; max-width: 380px; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .header { margin-bottom: 28px; }
        .header-top {
            display: flex; align-items: baseline;
            justify-content: space-between; margin-bottom: 4px;
        }
        .title {
            font-family: var(--mono); font-size: 1.15rem;
            font-weight: 500; color: var(--ink); letter-spacing: -0.02em;
        }
        .accuracy-pill {
            font-family: var(--mono); font-size: 0.72rem;
            color: var(--accent); background: var(--accent-light);
            padding: 3px 10px; border-radius: 100px;
        }
        .subtitle { font-size: 0.82rem; color: var(--ink-muted); font-weight: 300; }
        .canvas-card {
            background: #000000;
            border-radius: 16px; padding: 16px;
            margin-bottom: 12px; position: relative;
        }
        canvas#drawCanvas {
            display: block; border-radius: 8px; cursor: crosshair;
            width: 100%; height: auto; touch-action: none;
        }
        .canvas-hint {
            position: absolute; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            font-family: var(--mono); font-size: 0.65rem;
            color: rgba(255,255,255,0.22); white-space: nowrap;
            pointer-events: none; transition: opacity 0.3s;
        }
        .canvas-hint.hidden { opacity: 0; }
        .controls {
            display: grid; grid-template-columns: 1fr auto;
            gap: 8px; margin-bottom: 12px;
        }
        .btn {
            font-family: var(--sans); font-size: 0.88rem; font-weight: 500;
            border: none; border-radius: 10px; cursor: pointer;
            padding: 12px 20px; transition: all 0.15s ease;
        }
        .btn-predict { background: var(--ink); color: #fff; }
        .btn-predict:hover { background: #2D2D2A; transform: translateY(-1px); }
        .btn-predict:active { transform: translateY(0); }
        .btn-clear { background: var(--border); color: var(--ink-muted); padding: 12px 16px; }
        .btn-clear:hover { background: var(--ink-faint); color: var(--ink); }
        .result {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 14px; padding: 20px 24px; min-height: 90px;
            display: flex; align-items: center; justify-content: space-between;
            transition: border-color 0.3s ease;
        }
        .result.has-result { border-color: var(--accent); }
        .result-left { display: flex; flex-direction: column; gap: 2px; }
        .result-label {
            font-family: var(--mono); font-size: 0.68rem; color: var(--ink-faint);
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .result-placeholder { font-size: 0.85rem; color: var(--ink-faint); font-weight: 300; }
        .result-digit {
            font-family: var(--mono); font-size: 3.2rem; font-weight: 500;
            color: var(--ink); line-height: 1; letter-spacing: -0.04em;
            animation: popIn 0.25s cubic-bezier(0.175,0.885,0.32,1.275) both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }
        .result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .confidence-label {
            font-family: var(--mono); font-size: 0.68rem; color: var(--ink-faint);
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .confidence-value {
            font-family: var(--mono); font-size: 1.1rem;
            font-weight: 500; color: var(--accent);
        }
        .confidence-bar-wrap {
            width: 64px; height: 3px; background: var(--border);
            border-radius: 100px; overflow: hidden;
        }
        .confidence-bar {
            height: 100%; background: var(--accent); border-radius: 100px;
            width: 0%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s;
        }
        .analyzing-dots { display: flex; gap: 5px; align-items: center; margin-top: 4px; }
        .analyzing-dots span {
            width: 5px; height: 5px; background: var(--ink-faint);
            border-radius: 50%; animation: dot 1.2s ease-in-out infinite;
        }
        .analyzing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .analyzing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot {
            0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
            40%          { transform: scale(1);   opacity: 1;   }
        }
        .footer {
            margin-top: 16px; text-align: center;
            font-family: var(--mono); font-size: 0.65rem;
            color: var(--ink-faint); letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-top">
            <span class="title">digit_classifier</span>
            <span class="accuracy-pill">acc {{ accuracy }}%</span>
        </div>
        <p class="subtitle">Dibuja un número del 0 al 9</p>
    </div>

    <!--
        Canvas: resolución interna 256×256 (múltiplo exacto de 8).
        Fondo negro puro #000000 — el dataset tiene fondo = 0 exacto.
        CSS lo escala al 100% del contenedor sin alterar los píxeles internos.
    -->
    <div class="canvas-card">
        <canvas id="drawCanvas" width="256" height="256"></canvas>
        <span class="canvas-hint" id="canvasHint">dibuja aquí →</span>
    </div>

    <div class="controls">
        <button class="btn btn-predict" onclick="predecir()">Predecir</button>
        <button class="btn btn-clear"   onclick="borrar()"   title="Borrar">✕</button>
    </div>

    <div class="result" id="resultBox">
        <div class="result-left">
            <span class="result-placeholder">Sin resultado</span>
        </div>
    </div>

    <p class="footer">Julio García · scikit-learn LogisticRegression · MNIST</p>
</div>

<script>
"use strict";

const canvas = document.getElementById('drawCanvas');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('canvasHint');
let dibujando = false, hasDrawn = false;

// ─── Inicializar canvas ───────────────────────────────────────────────────────
// Fondo negro PURO (#000000). El dataset digits tiene fondo exactamente 0.
// Un fondo gris oscuro (ej. #1A1A18 = valor 26) añade ~1.6 en escala 0-16
// a todos los píxeles de fondo, lo que corrompe la predicción.
ctx.fillStyle = '#000000';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.strokeStyle = '#ffffff';
ctx.lineWidth   = 22;   // trazo suficientemente grueso para tener masa de píxeles al reducir
ctx.lineCap     = 'round';
ctx.lineJoin    = 'round';

// ─── Coordenadas ─────────────────────────────────────────────────────────────
// El canvas se muestra más pequeño que su resolución interna (CSS width:100%).
// Sin este cálculo, las coordenadas quedan desplazadas.
function getPos(e) {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const src    = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY
    };
}

function startDraw(e) {
    dibujando = true;
    if (!hasDrawn) { hasDrawn = true; hint.classList.add('hidden'); }
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
}
function draw(e) {
    if (!dibujando) return;
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
}
function stopDraw() { dibujando = false; }

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); draw(e);      }, { passive: false });
canvas.addEventListener('touchend',   stopDraw);

// ─── Borrar ───────────────────────────────────────────────────────────────────
function borrar() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hasDrawn = false;
    hint.classList.remove('hidden');
    const box = document.getElementById('resultBox');
    box.className = 'result';
    box.innerHTML = '<div class="result-left"><span class="result-placeholder">Sin resultado</span></div>';
}

// ─── Preprocesado ─────────────────────────────────────────────────────────────
//
// Objetivo: reproducir el formato del dataset sklearn digits (imágenes 8×8,
// dígito centrado y ocupando casi toda la imagen, valores 0-16).
//
// Pasos:
//  1. Leer píxeles del canvas 256×256 (canal R = escala de grises)
//  2. Umbral de ruido: R < 30 → 0  (elimina suavizado del borde del trazo)
//  3. Bounding box: encontrar el rectángulo mínimo que contiene el trazo
//  4. Padding 15%: evitar que el trazo quede pegado al borde en el 8×8 final
//  5. Canvas cuadrado: el lado mayor del bbox define el tamaño, el dígito se
//     centra dentro → preserva proporciones igual que el dataset
//  6. Reducir a 8×8 con interpolación bilineal de alta calidad
//  7. Normalización por muestra: max → 16.0
//     Garantiza que la intensidad máxima siempre sea 16, igual que el dataset,
//     sin importar el tamaño o grosor del trazo del usuario.
//
function preprocesar() {
    const W = canvas.width;   // 256
    const H = canvas.height;  // 256
    const raw = ctx.getImageData(0, 0, W, H).data;  // [R,G,B,A, R,G,B,A, ...]

    // 1 + 2: extraer canal R y aplicar umbral de ruido
    const UMBRAL = 30;
    const gray   = new Float32Array(W * H);
    for (let i = 0; i < W * H; i++) {
        const r = raw[i * 4];
        gray[i] = (r < UMBRAL) ? 0 : r;
    }

    // 3: bounding box
    let minX = W, maxX = -1, minY = H, maxY = -1;
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            if (gray[y * W + x] > 0) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
        }
    }

    // Canvas vacío → devolver ceros
    if (maxX < 0) return new Array(64).fill(0);

    // 4: padding 15% del lado mayor del bbox
    const bboxW = maxX - minX;
    const bboxH = maxY - minY;
    const pad   = Math.round(Math.max(bboxW, bboxH) * 0.15);
    const x0 = Math.max(0,   minX - pad);
    const y0 = Math.max(0,   minY - pad);
    const x1 = Math.min(W,   maxX + pad + 1);
    const y1 = Math.min(H,   maxY + pad + 1);
    const cW = x1 - x0;
    const cH = y1 - y0;

    // 5: canvas cuadrado temporal — dígito centrado dentro
    const side = Math.max(cW, cH);
    const offX = Math.round((side - cW) / 2);
    const offY = Math.round((side - cH) / 2);

    const tmp  = document.createElement('canvas');
    tmp.width  = side;
    tmp.height = side;
    const tCtx = tmp.getContext('2d');
    tCtx.fillStyle = '#000000';
    tCtx.fillRect(0, 0, side, side);
    tCtx.drawImage(canvas, x0, y0, cW, cH, offX, offY, cW, cH);

    // 6: reducir a 8×8 con interpolación bilineal
    const small  = document.createElement('canvas');
    small.width  = 8;
    small.height = 8;
    const sCtx   = small.getContext('2d');
    sCtx.imageSmoothingEnabled = true;
    sCtx.imageSmoothingQuality = 'high';
    sCtx.drawImage(tmp, 0, 0, 8, 8);

    // 7: extraer canal R, clip para evitar negativos del suavizado,
    //    y normalización por muestra: escalar max → 16.0
    const pixels = sCtx.getImageData(0, 0, 8, 8).data;
    const flat   = new Array(64);
    let maxVal   = 0;

    for (let i = 0; i < 64; i++) {
        const v = Math.max(0, pixels[i * 4]);
        flat[i] = v;
        if (v > maxVal) maxVal = v;
    }

    if (maxVal > 0) {
        const scale = 16.0 / maxVal;
        for (let i = 0; i < 64; i++) flat[i] *= scale;
    }

    return flat;
}

// ─── Predecir ─────────────────────────────────────────────────────────────────
async function predecir() {
    const box = document.getElementById('resultBox');
    box.className = 'result';
    box.innerHTML = `
        <div class="result-left">
            <span class="result-label">Analizando</span>
            <div class="analyzing-dots"><span></span><span></span><span></span></div>
        </div>`;

    const pixelData = preprocesar();

    try {
        const res  = await fetch('/predict', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ pixels: pixelData })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const pct = data.confidence;
        box.className = 'result has-result';
        box.innerHTML = `
            <div class="result-left">
                <span class="result-label">Predicción</span>
                <span class="result-digit">${data.prediction}</span>
            </div>
            <div class="result-right">
                <span class="confidence-label">Confianza</span>
                <span class="confidence-value">${pct}%</span>
                <div class="confidence-bar-wrap">
                    <div class="confidence-bar" id="cbar"></div>
                </div>
            </div>`;

        requestAnimationFrame(() => {
            document.getElementById('cbar').style.width = Math.min(pct, 100) + '%';
        });

    } catch (err) {
        box.className = 'result';
        box.innerHTML = `<div class="result-left"><span class="result-placeholder">Error: ${err.message}</span></div>`;
    }
}
</script>
</body>
</html>
